name: Tests & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Lua
      uses: xpol/setup-lua@v1
      with:
        lua-version: 5.1

    - name: Install Luau Linter
      run: |
        curl -L https://github.com/Roblox/luau/releases/download/0.x/luau -o luau
        chmod +x luau

    - name: Lint Lua files
      run: |
        find . -name "*.lua" -type f ! -path "./node_modules/*" ! -path "./.git/*" | while read file; do
          ./luau "$file" || exit 1
        done

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v3

    - name: Set up Lua
      uses: xpol/setup-lua@v1
      with:
        lua-version: 5.1

    - name: Run tests
      run: |
        echo "Tests will run in Roblox Studio environment"
        echo "This is a placeholder for actual test execution"
